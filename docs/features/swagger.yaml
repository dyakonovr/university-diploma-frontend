host: localhost:8000
info:
  contact: {}
  description: AI-powered management assistant for small businesses.
  title: Secretary App API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.TokensResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      summary: Authenticate a user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Client-side logout. The refresh token is discarded client-side;
        no server state is changed.
      parameters:
      - description: Refresh token (optional)
        in: body
        name: request
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.LogoutRequest'
