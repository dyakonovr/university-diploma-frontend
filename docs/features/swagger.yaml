host: localhost:8000
info:
  contact: {}
  description: AI-powered management assistant for small businesses.
  title: Secretary App API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      summary: Authenticate a user
      tags:
      - auth
  /auth/logout:
    post:
      description: Clears the refresh token cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchange a refresh token (from cookie or body) for a new token
        pair.
      parameters:
      - description: Refresh token (optional if sent via cookie)
        in: body
        name: request
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /integrations/available:
    get:
      description: Returns a static list of supported providers with their config
        field metadata.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/secretary-app_internal_http_dto.AvailableIntegration'
                  type: array
              type: object
      summary: List available integration providers
      tags:
      - integrations
  /workspaces:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/secretary-app_internal_http_dto.WorkspaceResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List my workspaces
      tags:
      - workspaces
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.CreateWorkspaceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.WorkspaceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a workspace
      tags:
      - workspaces
  /workspaces/{workspaceId}:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.WorkspaceResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a workspace
      tags:
      - workspaces
    patch:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Updated fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.UpdateWorkspaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.WorkspaceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a workspace
      tags:
      - workspaces
  /workspaces/{workspaceId}/calendar-events:
    get:
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Filter events starting at or after this time (RFC3339)
        in: query
        name: startFrom
        type: string
      - description: Filter events ending at or before this time (RFC3339)
        in: query
        name: endTo
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/secretary-app_internal_http_dto.CalendarEventResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List calendar events in a workspace
      tags:
      - calendar-events
    post:
      consumes:
      - application/json
      parameters:
      - description: Workspace ID
        in: path
        name: workspaceId
        required: true
        type: string
      - description: Event data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/secretary-app_internal_http_dto.CreateCalendarEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.CalendarEventResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/secretary-app_internal_http_httputils.ValidationErrorResponse'
        "500":
          description: Internal Server Error
          schema:
