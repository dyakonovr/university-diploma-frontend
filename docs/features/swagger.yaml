      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/secretary-app_internal_http_httputils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/secretary-app_internal_http_dto.UserResponse'
              type: object
        "401":
